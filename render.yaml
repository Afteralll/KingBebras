# Render Blueprint: https://render.com/docs/blueprint-spec
# Custom domain: Dashboard → Settings → Custom Domain (CNAME to onrender.com).
# For durable data on the free web tier, set DATABASE_URL to a Neon Postgres connection string
# (Dashboard → Environment → DATABASE_URL). Local/dev can omit it to use server/data.sqlite.
services:
  - type: web
    name: kingbebras
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
