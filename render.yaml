# Render Blueprint: https://render.com/docs/blueprint-spec
# Custom domain: Dashboard → Settings → Custom Domain (CNAME to onrender.com).
# Free web services may lose SQLite on redeploy; for durable data use a paid instance +
# Persistent Disk and set env KB_DB_PATH=/mnt/your-disk/data.sqlite (see Render Disks docs).
services:
  - type: web
    name: kingbebras
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
