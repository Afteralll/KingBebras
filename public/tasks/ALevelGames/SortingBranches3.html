<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌳 Branch Buddies · Forest Sorting</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Fredoka', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        /* ---------- ANIMATED FOREST BACKGROUND ---------- */
        #forest-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #2d6e3b, #143a1a);
            overflow: hidden;
        }

        /* Trees (CSS art) */
        .tree {
            position: absolute;
            bottom: 0;
            width: 60px;
            height: 120px;
            background: #5a3f2b;
            border-radius: 30% 30% 0 0;
            box-shadow: inset -3px 0 8px #2f1f0f;
            z-index: 1;
        }

            .tree::before {
                content: "";
                position: absolute;
                top: -50px;
                left: -25px;
                width: 110px;
                height: 90px;
                background: #2d6b3a;
                border-radius: 50% 50% 30% 30%;
                box-shadow: 0 10px 0 #1d4526, inset -10px -5px 10px #1b3e1b;
            }

            .tree::after {
                content: "🌲";
                position: absolute;
                top: -45px;
                left: 10px;
                font-size: 70px;
                opacity: 0.3;
                filter: drop-shadow(2px 4px 4px #0f2a0f);
            }

        /* Second tree variant */
        .tree2 {
            background: #6b4a2e;
            width: 80px;
            height: 150px;
            border-radius: 40% 40% 0 0;
        }

            .tree2::before {
                background: #3e8244;
                width: 130px;
                left: -25px;
                top: -60px;
                height: 100px;
            }

        /* Flying branches (silhouettes) */
        .flying-branch {
            position: absolute;
            width: 100px;
            height: 20px;
            background: #4a311c;
            border-radius: 30px;
            transform: rotate(15deg);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            opacity: 0.25;
            animation: floatBranch 22s linear infinite;
            z-index: 2;
        }

            .flying-branch::before {
                content: "";
                position: absolute;
                top: -15px;
                left: 20px;
                width: 8px;
                height: 30px;
                background: #4a311c;
                transform: rotate(30deg);
                border-radius: 10px;
            }

            .flying-branch::after {
                content: "🍂";
                position: absolute;
                top: -25px;
                right: 5px;
                font-size: 28px;
                opacity: 0.6;
            }

        /* Leaves */
        .leaf {
            position: absolute;
            color: #b3d9a0;
            font-size: 28px;
            opacity: 0.7;
            filter: drop-shadow(0 2px 4px #0f2f0f);
            animation: floatLeaf 12s ease-in-out infinite;
            z-index: 3;
            pointer-events: none;
        }

        @keyframes floatLeaf {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }

            50% {
                transform: translateY(-30px) rotate(10deg);
                opacity: 0.9;
            }

            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.6;
            }
        }

        @keyframes floatBranch {
            0% {
                left: -150px;
                transform: rotate(10deg);
            }

            100% {
                left: 110%;
                transform: rotate(15deg);
            }
        }

        /* additional floating elements */
        .acorn {
            position: absolute;
            font-size: 24px;
            animation: bob 8s infinite alternate;
        }

        @keyframes bob {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-15px);
            }
        }

        /* ---------- MAIN GAME (above background) ---------- */
        .game-wrapper {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 30px 20px;
            pointer-events: none; /* allow clicks to pass through wrapper? No, we need pointer events on game elements */
        }

        .game-board {
            pointer-events: auto;
            background: #6b8c5c;
            background-image: radial-gradient(circle, #7fa86b 10%, #4f7840 80%);
            padding: 30px 40px 40px;
            border-radius: 100px 100px 60px 60px;
            box-shadow: 0 18px 0 #3a5530, 0 25px 30px rgba(0,0,0,0.3), 0 0 0 8px rgba(210, 180, 140, 0.3);
            border: 6px solid #a77b4b;
            max-width: 1000px;
            width: fit-content;
            margin: 0 auto;
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0 0 5px;
            color: #ffefc0;
            text-shadow: 5px 5px 0 #3f632f;
            text-align: center;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .instruction {
            background: #efe0c9;
            color: #2d461f;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            margin: 10px 0 25px;
            box-shadow: inset 0 2px 5px #a5a58d, 0 8px 0 #6b4e2e;
            border: 2px solid #c8a060;
        }

        .play-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        /* SLOTS (stumps) */
        .slot {
            width: 130px;
            height: 130px;
            background: #7a5a3a;
            background: radial-gradient(circle at 30% 30%, #b38b5b, #5a3f22);
            border-radius: 45% 45% 35% 35% / 50% 50% 30% 30%;
            box-shadow: inset 0 -12px 0 #3d2b18, 0 14px 0 #4a3622, 0 12px 20px rgba(0,0,0,0.3);
            border: 4px solid #d4b483;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: box-shadow 0.1s;
            position: relative;
        }

            .slot::after {
                content: "🌱";
                position: absolute;
                bottom: -10px;
                right: -5px;
                font-size: 28px;
                filter: drop-shadow(0 3px 3px #1f3f1a);
                opacity: 0.9;
            }

            .slot:empty::before {
                content: "🍂";
                font-size: 42px;
                opacity: 0.4;
                filter: drop-shadow(0 2px 2px #111);
            }

        #buffer {
            background: #6d8f4e;
            background: radial-gradient(circle at 30% 30%, #aecf8a, #4e7233);
            box-shadow: inset 0 -12px 0 #2f4d1e, 0 14px 0 #3b5e2a, 0 12px 20px rgba(0,0,0,0.3);
            border: 4px solid #eac784;
        }

            #buffer::after {
                content: "🍃  helper  🍃";
                position: absolute;
                bottom: -35px;
                left: 0;
                right: 0;
                font-size: 18px;
                font-weight: 600;
                color: #fbf3d5;
                text-shadow: 2px 2px 0 #2f4d1e;
                white-space: nowrap;
            }

        #shelf {
            display: flex;
            gap: 20px;
            background: #5a7a44;
            padding: 25px 30px;
            border-radius: 70px 70px 40px 40px;
            box-shadow: inset 0 5px 8px #3b562b, 0 18px 0 #3a5a2a, 0 12px 20px #1e3018;
            border-bottom: 8px solid #b38b5a;
        }

        /* BRANCHES (real twig look) */
        .branch {
            width: 110px;
            height: 110px;
            background: #a56e3a;
            background: linear-gradient(145deg, #c9924b, #7b4f24);
            border-radius: 55% 25% 60% 30% / 45% 55% 40% 60%;
            box-shadow: inset -4px -4px 8px #4e3118, inset 6px 6px 14px #f0cf9c, 0 10px 0 #5c3e1f, 0 12px 15px rgba(0,0,0,0.3);
            border: 3px solid #e6b87b;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            font-weight: 700;
            font-size: 44px;
            color: #fff8e0;
            text-shadow: 4px 4px 0 #3f2a12;
            position: relative;
            transform: rotate(2deg);
            transition: transform 0.05s, filter 0.1s, box-shadow 0.1s;
            font-family: 'Fredoka', sans-serif;
            background-image: repeating-linear-gradient(45deg, rgba(90,50,20,0.2) 0px, rgba(90,50,20,0.2) 3px, transparent 3px, transparent 8px);
        }

            .branch:active {
                cursor: grabbing;
                transform: rotate(0deg) scale(0.97);
                box-shadow: inset -4px -4px 8px #4e3118, inset 6px 6px 14px #f0cf9c, 0 4px 0 #5c3e1f, 0 8px 10px rgba(0,0,0,0.3);
            }

            .branch .leaf-left {
                position: absolute;
                top: -12px;
                left: -8px;
                font-size: 34px;
                filter: drop-shadow(2px 4px 3px #1f421f);
                transform: rotate(-25deg);
            }

            .branch .leaf-right {
                position: absolute;
                bottom: -10px;
                right: -10px;
                font-size: 36px;
                filter: drop-shadow(2px 4px 3px #1f421f);
                transform: rotate(20deg);
            }

            .branch .leaf-top {
                position: absolute;
                top: -15px;
                right: 5px;
                font-size: 28px;
                filter: drop-shadow(2px 3px 2px #1f421f);
                transform: rotate(15deg);
            }

        .branch-number {
            background: rgba(70, 40, 20, 0.3);
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(1px);
            line-height: 1;
            z-index: 2;
        }

        /* Buttons */
        .button-panel {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 40px 0 20px;
        }

        .wood-btn {
            background: #c99a5e;
            background: linear-gradient(to bottom, #f3d7a7, #b5824a);
            border: 5px solid #624c2e;
            border-radius: 60px;
            color: #1e3814;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            padding: 14px 35px;
            text-shadow: 1px 1px 0 #efdba1;
            box-shadow: 0 10px 0 #5a3f22, 0 5px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: all 0.08s;
            letter-spacing: 3px;
            border: none;
            outline: 4px solid #7a5e3a;
        }

            .wood-btn:active {
                transform: translateY(7px);
                box-shadow: 0 3px 0 #5a3f22, 0 5px 12px black;
            }

        .reset-btn {
            background: #a2b87b;
            background: linear-gradient(to bottom, #d4e8b0, #84a36b);
            box-shadow: 0 10px 0 #426135, 0 5px 15px black;
            outline-color: #4f6b3a;
        }

        #status {
            background: #efe0cd;
            color: #1e3a14;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 20px 35px;
            border-radius: 50px;
            box-shadow: inset 0 2px 8px #bbaa8c, 0 12px 0 #6b5236, 0 8px 15px #1f2e16;
            border: 3px solid #c8a875;
            text-align: center;
            margin-top: 15px;
            line-height: 1.6;
        }

            #status b {
                font-size: 2.2rem;
                background: #fef7e0;
                padding: 8px 25px;
                border-radius: 40px;
                display: inline-block;
                margin-top: 10px;
            }

        .footer-note {
            margin-top: 15px;
            color: #f0e6b0;
            font-size: 1.3rem;
            text-shadow: 2px 2px 0 #2b4a1e;
        }
    </style>
</head>
<body>

    <!-- ANIMATED FOREST BACKGROUND (flying branches, trees, leaves) -->
    <div id="forest-bg">
        <!-- Trees (static but with shadows) -->
        <div class="tree" style="left: 5%; bottom: 0; transform: scale(1.2);"></div>
        <div class="tree tree2" style="left: 15%; bottom: 0; transform: scale(0.9);"></div>
        <div class="tree" style="right: 8%; bottom: 0; transform: scale(1.1);"></div>
        <div class="tree tree2" style="right: 20%; bottom: 0; transform: scale(0.8);"></div>
        <div class="tree" style="left: 40%; bottom: 0; transform: scale(1); opacity:0.8;"></div>

        <!-- Flying branches (animated) -->
        <div class="flying-branch" style="top: 15%; animation-duration: 28s;"></div>
        <div class="flying-branch" style="top: 45%; animation-duration: 35s; transform: rotate(-5deg); width: 130px;"></div>
        <div class="flying-branch" style="top: 70%; animation-duration: 22s; opacity:0.3;"></div>
        <div class="flying-branch" style="top: 80%; animation-duration: 40s; width: 80px;"></div>

        <!-- Floating leaves (many) -->
        <div class="leaf" style="top: 10%; left: 10%; animation-delay: 0s;">🍃</div>
        <div class="leaf" style="top: 25%; left: 85%; animation-delay: 2s; font-size: 32px;">🍂</div>
        <div class="leaf" style="top: 60%; left: 20%; animation-delay: 4s;">🌿</div>
        <div class="leaf" style="top: 75%; left: 70%; animation-delay: 1.5s;">🍁</div>
        <div class="leaf" style="top: 40%; left: 45%; animation-delay: 3s;">🍃</div>
        <div class="leaf" style="top: 15%; left: 60%; animation-delay: 5s;">🌱</div>
        <div class="leaf" style="top: 85%; left: 30%; animation-delay: 2.8s; font-size: 24px;">🍂</div>
        <div class="leaf" style="top: 50%; left: 5%; animation-delay: 1s;">🌿</div>
        <div class="leaf" style="top: 30%; left: 90%; animation-delay: 3.5s;">🍁</div>

        <!-- Acorns / small items -->
        <div class="acorn" style="bottom: 15%; left: 12%;">🌰</div>
        <div class="acorn" style="bottom: 25%; right: 18%; animation-duration: 10s;">🐿️</div>
        <div class="acorn" style="bottom: 8%; left: 35%;">🍄</div>
    </div>

    <!-- GAME WRAPPER (above background) -->
    <div class="game-wrapper">
        <div class="game-board">
            <h1>
                <span>🌳</span> Branch Buddies <span>🍂</span>
            </h1>
            <div style="text-align: center;">
                <span class="instruction">🐿️ 1 → 2 → 3 → 4 → 5 · use the leafy spot!</span>
            </div>

            <div class="play-area">
                <!-- BUFFER (helper slot) -->
                <div class="slot" id="buffer"></div>

                <!-- SHELF with 5 slots -->
                <div id="shelf">
                    <div class="slot" data-index="0"></div>
                    <div class="slot" data-index="1"></div>
                    <div class="slot" data-index="2"></div>
                    <div class="slot" data-index="3"></div>
                    <div class="slot" data-index="4"></div>
                </div>
            </div>

            <div class="button-panel">
                <button class="wood-btn" onclick="finish()">✨ Finish ✨</button>
                <button class="wood-btn reset-btn" onclick="resetGame()">🔄 New Game</button>
            </div>

            <div id="status">
                🌟 Drag the branches to sort them! 🌟
            </div>
            <div class="footer-note">
                🍃 every move counts · be quick like a squirrel 🍃
            </div>
        </div>
    </div>

    <script>
        (function () {
            "use strict";

            // ----- STATE (identical to original) -----
            let state = [3, 1, 5, 2, 4];
            let buffer = null;

            let switches = 0;
            let startTime = Date.now();

            // ----- DOM elements -----
            const shelfSlots = document.querySelectorAll("#shelf .slot");
            const bufferSlot = document.getElementById("buffer");
            const statusDiv = document.getElementById("status");

            // ----- Helper: create a branch element (looks like a real twig!) -----
            function createBranch(value, index, location) {
                const div = document.createElement("div");
                div.className = "branch";
                div.setAttribute("draggable", "true");
                div.setAttribute("data-value", value);
                div.setAttribute("data-from-index", index !== undefined ? index : "");
                div.setAttribute("data-from-location", location);

                // Inner structure with leaves
                div.innerHTML = `
            <span class="leaf-left">🌿</span>
            <span class="leaf-right">🍃</span>
            <span class="leaf-top">🌱</span>
            <span class="branch-number">${value}</span>
          `;

                // Drag start: store data
                div.addEventListener("dragstart", (e) => {
                    e.dataTransfer.setData("text/plain", value);
                    e.dataTransfer.setData("from-index", index !== undefined ? index : "");
                    e.dataTransfer.setData("from-location", location);
                    e.dataTransfer.effectAllowed = "move";
                });

                return div;
            }

            // ----- Render: update all slots based on state -----
            function render() {
                // Clear shelf slots
                shelfSlots.forEach((slot, i) => {
                    slot.innerHTML = "";
                    if (state[i] !== null) {
                        slot.appendChild(createBranch(state[i], i, "shelf"));
                    }
                });

                // Clear buffer
                bufferSlot.innerHTML = "";
                if (buffer !== null) {
                    bufferSlot.appendChild(createBranch(buffer, null, "buffer"));
                }
            }

            // ----- Drag & Drop logic (exactly as original) -----
            function setupDropTargets() {
                const allSlots = [bufferSlot, ...shelfSlots];

                allSlots.forEach(slot => {
                    // Prevent default to allow drop
                    slot.addEventListener("dragover", (e) => {
                        e.preventDefault();
                        e.dataTransfer.dropEffect = "move";
                    });

                    slot.addEventListener("drop", (e) => {
                        e.preventDefault();

                        // Get dragged data
                        const value = parseInt(e.dataTransfer.getData("text/plain"));
                        const fromIndex = e.dataTransfer.getData("from-index");
                        const fromLocation = e.dataTransfer.getData("from-location");

                        // Determine target
                        const isBuffer = (slot.id === "buffer");
                        const targetIndex = slot.dataset.index !== undefined ? parseInt(slot.dataset.index) : null;

                        let moved = false;

                        // 1) shelf → buffer
                        if (isBuffer && buffer === null && fromLocation === "shelf") {
                            buffer = value;
                            state[fromIndex] = null;
                            moved = true;
                        }
                        // 2) buffer → shelf
                        else if (!isBuffer && fromLocation === "buffer" && state[targetIndex] === null) {
                            state[targetIndex] = buffer;
                            buffer = null;
                            moved = true;
                        }
                        // 3) shelf → shelf
                        else if (!isBuffer && fromLocation === "shelf" && state[targetIndex] === null) {
                            state[targetIndex] = value;
                            state[fromIndex] = null;
                            moved = true;
                        }

                        if (moved) {
                            switches++;
                        }

                        render();
                        updateStatusMessage();
                    });
                });
            }

            // ----- Prevent default on document to avoid interference -----
            document.addEventListener("dragover", (e) => e.preventDefault());
            document.addEventListener("drop", (e) => e.preventDefault());

            // ----- Status message (live update) -----
            function updateStatusMessage() {
                const correct = [1, 2, 3, 4, 5];
                let errors = 0;
                for (let i = 0; i < 5; i++) {
                    if (state[i] !== correct[i]) errors++;
                }
                if (errors === 0) {
                    statusDiv.innerHTML = `🎉 All branches in order! 🎉<br>✨ Switches: ${switches}  |  Click Finish ✨`;
                } else {
                    statusDiv.innerHTML = `🌱 Sorting...  Mistakes: ${errors}  |  🔄 Switches: ${switches}`;
                }
            }

            // ----- FINISH & SCORING (unchanged) -----
            window.finish = function () {
                let errorScore = 10;
                let switchScore = 10;
                let timeScore = 10;

                const correct = [1, 2, 3, 4, 5];
                let errors = 0;
                for (let i = 0; i < 5; i++) {
                    if (state[i] !== correct[i]) errors++;
                }

                errorScore -= errors * 0.5;
                if (errorScore < 0) errorScore = 0;

                if (switches > 6) {
                    let steps = Math.ceil((switches - 6) / 2);
                    switchScore -= steps;
                }
                if (switchScore < 0) switchScore = 0;

                const time = (Date.now() - startTime) / 1000;
                if (time > 60) {
                    timeScore -= Math.floor((time - 60) / 20) + 1;
                }
                if (timeScore < 0) timeScore = 0;

                const finalScore = 0.5 * errorScore + 0.3 * switchScore + 0.2 * timeScore;

                statusDiv.innerHTML = `
            <div style="font-size:1.8rem; margin-bottom:10px;">🌳 Your forest report 🌳</div>
            🍁 Mistakes: ${errors}  &nbsp;|&nbsp;  🔄 Switches: ${switches}  &nbsp;|&nbsp;  ⏱️ Time: ${time.toFixed(1)}s<br>
            <div style="display:flex; justify-content:center; gap:30px; margin:15px 0;">
              <span>🌰 Error: ${errorScore.toFixed(2)}</span>
              <span>🍂 Switch: ${switchScore.toFixed(2)}</span>
              <span>🌲 Time: ${timeScore.toFixed(2)}</span>
            </div>
            <b>✨ Final Score: ${finalScore.toFixed(2)} / 10 ✨</b>
          `;

                window.__kb?.finish?.({ errors, switches, time, finalScore });
            };

            // ----- RESET game -----
            window.resetGame = function () {
                state = [3, 1, 5, 2, 4];
                buffer = null;
                switches = 0;
                startTime = Date.now();
                render();
                statusDiv.innerHTML = `🌟 New game! Sort the branches 🌟`;
            };

            // ----- Initialize -----
            function init() {
                render();
                setupDropTargets();
                updateStatusMessage();
            }

            init();
        })();
    </script>

    <script type="module">
        import { createKbTask } from '/task-sdk.js';
        const kb = createKbTask('sorting-branches-3');
        window.__kb = kb;
        document.addEventListener('click', () => kb.click(), true);
    </script>
</body>
</html>
