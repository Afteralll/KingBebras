<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>✨ Picture Flow · Sort in Order ✨</title>

    <!-- modern, friendly font (optional but keeps it clean) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ----- RESET & BASE (enhanced visual only, zero logic change) ----- */
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f6f9fc 0%, #e2ebf5 100%);
            font-family: 'Quicksand', 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 1.5rem 1rem 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1e2f4e;
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 4px 4px 12px rgba(0,20,50,0.08);
        }

        h2 {
            font-weight: 500;
            font-size: 1.3rem;
            margin: 0.5rem 0 1.2rem;
            color: #2c3e66;
            opacity: 0.9;
        }

        /* ----- REFERENCE IMAGE (elegant frame) ----- */
        #reference {
            width: 650px;
            max-width: 95%;
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 30px -8px rgba(0, 20, 40, 0.25), 0 6px 0 0 #ffffff80 inset, 0 -2px 8px rgba(0,0,0,0.02) inset;
            margin-bottom: 30px;
            background: white;
            padding: 6px;
            transition: transform 0.2s ease;
            border: 1px solid rgba(255,255,255,0.7);
        }

            #reference:hover {
                transform: scale(1.002);
            }

        /* ----- DRAGGABLE PIECES (modern cards, friendly) ----- */
        #pieces {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin-bottom: 40px;
            padding: 8px 12px;
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(2px);
            border-radius: 60px;
            max-width: 1100px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 6px 12px rgba(42, 65, 100, 0.08);
        }

        .piece {
            width: 100px;
            height: 100px;
            cursor: grab;
            border: none;
            border-radius: 20px;
            background: white;
            object-fit: cover;
            box-shadow: 0 8px 0 #b0c4de, 0 12px 18px -6px rgba(20, 40, 70, 0.2);
            transition: all 0.15s ease;
            border: 2px solid white;
            transform: rotate(0deg);
        }

            .piece:hover {
                transform: translateY(-5px) scale(1.02);
                box-shadow: 0 10px 0 #8fa9c9, 0 18px 22px -8px rgba(0, 20, 50, 0.25);
                cursor: grab;
            }

            .piece:active {
                cursor: grabbing;
                opacity: 0.9;
                transform: scale(0.98);
                box-shadow: 0 4px 0 #7a94b3, 0 8px 12px -4px rgba(0,0,0,0.1);
            }

        /* ----- HORIZONTAL BOARD (9 slots — clean & premium) ----- */
        #board {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap; /* keeps responsiveness — same as original */
            margin: 0 auto 10px;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 50px;
            box-shadow: 0 20px 30px -10px rgba(19, 40, 70, 0.15), 0 4px 0 0 #cddae9 inset, 0 1px 0 0 #ffffff inset;
            border: 1px solid rgba(255,255,255,0.6);
            max-width: fit-content;
        }

        .dropzone {
            width: 105px;
            height: 105px;
            background: #f8faff;
            border: 3px dashed #b7c9e2;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 #cdd9e9, 0 8px 14px rgba(44, 62, 100, 0.08);
            transition: border 0.1s, box-shadow 0.2s, background 0.2s;
            backdrop-filter: blur(2px);
        }

            .dropzone:hover {
                background: #ffffffd6;
                border-color: #6d8eb0;
                box-shadow: 0 8px 0 #b0c4de, 0 12px 18px -6px #1e3a5f33;
            }

            .dropzone img {
                width: 92px;
                height: 92px;
                pointer-events: none;
                border-radius: 16px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
                object-fit: cover;
                border: 2px solid white;
            }

        /* ----- FEEDBACK (correct / wrong) — more elegant glows ----- */
        .correct {
            border: 4px solid #2ecc71 !important;
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.2), 0 6px 0 #1e8c4c, 0 8px 14px rgba(0,0,0,0.1) !important;
            background: #f0fff4;
        }

        .wrong {
            border: 4px solid #e74c3c !important;
            box-shadow: 0 0 0 4px rgba(231, 76, 60, 0.15), 0 6px 0 #b03a2d, 0 8px 14px rgba(0,0,0,0.1) !important;
            background: #fff5f5;
        }

        /* ----- BUTTON (friendly & prominent) ----- */
        button {
            margin-top: 40px;
            padding: 16px 48px;
            font-size: 26px;
            font-weight: 700;
            font-family: 'Quicksand', sans-serif;
            border: none;
            background: linear-gradient(145deg, #2e5aaf, #1f3f7a);
            color: white;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 0 #0f2340, 0 8px 20px rgba(25, 60, 110, 0.3);
            letter-spacing: 1px;
            transition: all 0.1s ease;
            border: 1px solid #aac8ff;
            text-shadow: 0 1px 2px #00000020;
        }

            button:hover {
                transform: translateY(-3px);
                box-shadow: 0 14px 0 #0f2340, 0 12px 24px rgba(20, 50, 100, 0.35);
                background: linear-gradient(145deg, #3a6bc5, #254f94);
            }

            button:active {
                transform: translateY(5px);
                box-shadow: 0 6px 0 #0f2340, 0 8px 14px rgba(0,0,0,0.2);
            }

        /* ----- RESULT PANEL (score card) ----- */
        #result {
            margin-top: 30px;
            font-size: 24px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 20px 35px;
            border-radius: 48px;
            display: inline-block;
            box-shadow: 0 20px 30px -8px #1e3a5f1a, 0 2px 0 0 white inset;
            border: 1px solid rgba(255,255,255,0.8);
            color: #1e3a5f;
            line-height: 1.5;
            max-width: 90%;
        }

            #result br {
                display: block;
                content: "";
                margin: 6px 0;
            }

        /* small extra polish for the board container */
        .board-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* keep pieces flexible, no logic touched */
        .piece, .dropzone {
            user-select: none;
        }

            /* subtle animation for correct/wrong after check */
            .dropzone.correct img {
                filter: drop-shadow(0 0 6px #2ecc71aa);
            }

            .dropzone.wrong img {
                filter: drop-shadow(0 0 6px #e74c3caa);
            }

        /* responsive: keep board items nice on small screens */
        @media (max-width: 700px) {
            h1 {
                font-size: 2rem;
            }

            .piece {
                width: 85px;
                height: 85px;
            }

            .dropzone {
                width: 90px;
                height: 90px;
            }

                .dropzone img {
                    width: 78px;
                    height: 78px;
                }

            #board {
                gap: 8px;
            }

            button {
                font-size: 22px;
                padding: 14px 32px;
            }
        }

        /* tiny extra detail: floating effect for reference */
        #reference {
            transition: box-shadow 0.3s;
        }

            #reference:hover {
                box-shadow: 0 24px 36px -12px #142b44, 0 6px 0 0 #ffffffb0 inset;
            }

        /* the whole page feels cohesive */
        body {
            backdrop-filter: blur(2px);
        }

        /* final touch: the pieces container gets a soft label vibe */
        #pieces::before {
            content: "👇 drag these";
            display: block;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            color: #3a5775;
            margin-bottom: 6px;
            opacity: 0.8;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <h1>📸 Picture Flow</h1>
    <h2>✨ drag into the correct order ✨</h2>

    <!-- Big guide image — exactly same src & id -->
    <img id="reference" src="./OnlineClass/mainimage.PNG" alt="reference sequence">

    <!-- Pieces — all logic identical, only styling improved -->
    <div id="pieces">
        <img src="./OnlineClass/girl1.PNG" class="piece" draggable="true" id="piece1" data-correct="1" alt="piece 1">
        <img src="./OnlineClass/girl2.PNG" class="piece" draggable="true" id="piece2" data-correct="2" alt="piece 2">
        <img src="./OnlineClass/girl3.PNG" class="piece" draggable="true" id="piece3" data-correct="3" alt="piece 3">
        <img src="./OnlineClass/girl4.PNG" class="piece" draggable="true" id="piece4" data-correct="4" alt="piece 4">
        <img src="./OnlineClass/girl5.PNG" class="piece" draggable="true" id="piece5" data-correct="5" alt="piece 5">
        <img src="./OnlineClass/girl6.PNG" class="piece" draggable="true" id="piece6" data-correct="6" alt="piece 6">
        <img src="./OnlineClass/girl7.PNG" class="piece" draggable="true" id="piece7" data-correct="7" alt="piece 7">
        <img src="./OnlineClass/girl8.PNG" class="piece" draggable="true" id="piece8" data-correct="8" alt="piece 8">
        <img src="./OnlineClass/girl9.PNG" class="piece" draggable="true" id="piece9" data-correct="9" alt="piece 9">
    </div>

    <!-- Board: 9 spots — one horizontal row, same data attributes -->
    <div id="board">
        <div class="dropzone" data-spot="1"></div>
        <div class="dropzone" data-spot="2"></div>
        <div class="dropzone" data-spot="3"></div>
        <div class="dropzone" data-spot="4"></div>
        <div class="dropzone" data-spot="5"></div>
        <div class="dropzone" data-spot="6"></div>
        <div class="dropzone" data-spot="7"></div>
        <div class="dropzone" data-spot="8"></div>
        <div class="dropzone" data-spot="9"></div>
    </div>

    <button onclick="checkAnswer()">✓ Finish</button>

    <div id="result"></div>

    <script>
        // ============================================================
        //  EXACT SAME GAME LOGIC — not a single line changed.
        //  Only visual presentation is modernized.
        // ============================================================

        let draggedPiece = null;

        /* -------- SCORES (same as original) -------- */
        let errorScore = 10;
        let timeScore = 10;
        let clickScore = 10;
        let logicScore = 0;

        let clicks = 0;
        let wrongPlacements = 0;

        let firstMoveDone = false;
        let finishReported = false;

        let startTime = Date.now();

        /* Shuffle — exactly as before */
        window.onload = function () {
            let container = document.getElementById("pieces");
            for (let i = container.children.length; i >= 0; i--) {
                container.appendChild(
                    container.children[Math.random() * i | 0]
                );
            }
        };

        /* -------- DRAG (identical) -------- */
        document.querySelectorAll(".piece").forEach(piece => {
            piece.addEventListener("dragstart", function () {
                draggedPiece = this;
                clicks++;
                updateClickScore();
            });
        });

        /* -------- DROP (unchanged) -------- */
        document.querySelectorAll(".dropzone").forEach(zone => {
            zone.addEventListener("dragover", function (e) {
                e.preventDefault();
            });

            zone.addEventListener("drop", function () {
                clicks++;
                updateClickScore();

                /* LOGICAL REASONING — first move should be piece1 or piece9 */
                if (!firstMoveDone) {
                    if (
                        draggedPiece.dataset.correct == "1" ||
                        draggedPiece.dataset.correct == "9"
                    ) {
                        logicScore = 10;
                    }
                    firstMoveDone = true;
                }

                /* ERROR SCORE — reduce if placed in wrong spot */
                if (
                    draggedPiece.dataset.correct !== this.dataset.spot
                ) {
                    wrongPlacements++;
                    errorScore = Math.max(0, 10 - wrongPlacements);
                }

                /* normal dropping: if zone already has child, move it back */
                if (this.children.length > 0) {
                    document.getElementById("pieces").appendChild(this.children[0]);
                }

                this.appendChild(draggedPiece);
            });
        });

        /* ---------- CLICK SCORE (unchanged) ---------- */
        function updateClickScore() {
            if (clicks > 20) {
                clickScore = Math.max(0, 10 - Math.floor((clicks - 20) / 5) - 1);
            }
        }

        /* ---------- TIME SCORE (unchanged) ---------- */
        function updateTimeScore() {
            let seconds = Math.floor((Date.now() - startTime) / 1000);
            if (seconds <= 60) {
                timeScore = 10;
            } else {
                timeScore = Math.max(0, 10 - Math.floor((seconds - 60) / 20) - 1);
            }
        }

        /* ---------- CHECK (identical logic) ---------- */
        function checkAnswer() {
            let zones = document.querySelectorAll(".dropzone");
            let filled = 0;
            zones.forEach(zone => {
                if (zone.children.length) filled++;
            });

            if (filled < 9) {
                document.getElementById("result").innerHTML = "Place all 9 pictures before finishing the game.";
                return;
            }

            updateTimeScore();

            let correct = 0;
            document.querySelectorAll(".dropzone").forEach(zone => {
                zone.classList.remove("correct");
                zone.classList.remove("wrong");

                if (zone.children.length) {
                    let piece = zone.children[0];
                    if (piece.dataset.correct === zone.dataset.spot) {
                        zone.classList.add("correct");
                        correct++;
                    } else {
                        zone.classList.add("wrong");
                    }
                }
            });

            /* FINAL WEIGHTED SCORE (same formula) */
            let finalScore = (errorScore * 0.60) + (timeScore * 0.20) + (logicScore * 0.10) + (clickScore * 0.10);

            if (!finishReported) {
                finishReported = true;
                window.__kb?.finish?.({
                    finalScore: Number(finalScore.toFixed(2)),
                    correct,
                    placed: filled,
                    total: 9,
                    errorScore,
                    timeScore,
                    logicScore,
                    clickScore
                });
            }

            if (correct === 9) {
                document.getElementById("result").innerHTML = `
🎉 Perfect Order!<br><br>
Error Score: ${errorScore}/10 <br>
Time Score: ${timeScore}/10 <br>
Logic Score: ${logicScore}/10 <br>
Click Score: ${clickScore}/10 <br><br>
FINAL SCORE: ${finalScore.toFixed(2)} / 10
`;
            } else {
                document.getElementById("result").innerHTML = `
${correct} of 9 correct <br><br>
Error Score: ${errorScore}/10 <br>
Time Score: ${timeScore}/10 <br>
Logic Score: ${logicScore}/10 <br>
Click Score: ${clickScore}/10 <br><br>
Current Weighted Score: ${finalScore.toFixed(2)} / 10
`;
            }
        }
    </script>
    <script type="module">
        import { createKbTask } from '/task-sdk.js';
        const kb = createKbTask('online-class-picture-flow');
        window.__kb = kb;
        document.addEventListener('click', () => kb.click(), true);
    </script>

</body>
</html>
