<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bebras Cube Challenge | Spatial Reasoning Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Poppins', 'Arial', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            color: #f0f3fa;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* Glass-morphism UI panel - MUCH SMALLER */
        #ui {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
        }

        .game-container {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 0.4rem 0.9rem 0.6rem 0.9rem;
            display: inline-block;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
            transition: all 0.2s ease;
        }

        h2 {
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #ffffff, #b9d0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
            display: inline-block;
        }

        .question-badge {
            background: #1e2a3eaa;
            border-radius: 50px;
            padding: 0.15rem 0.7rem;
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
            backdrop-filter: blur(4px);
            border: 1px solid #3e5a7c;
            color: #cfdfff;
        }

        /* Answer palette - compact grid */
        #palette {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.35rem;
            margin: 0.3rem 0 0.3rem 0;
        }

        .answer-btn {
            background: rgba(20, 30, 50, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(80, 130, 210, 0.5);
            color: white;
            font-weight: 500;
            font-size: 0.7rem;
            padding: 0.25rem 0.7rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: inherit;
            letter-spacing: 0.2px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

            .answer-btn:hover {
                background: #2c3f66;
                border-color: #7aa9ff;
                transform: translateY(-1px);
            }

            .answer-btn:active {
                transform: translateY(1px);
            }

        /* action buttons row - compact */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }

        .action-btn {
            background: rgba(10, 20, 35, 0.9);
            border: 1px solid #4a627a;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.65rem;
            cursor: pointer;
            transition: 0.15s;
            color: #eef4ff;
            backdrop-filter: blur(4px);
            font-family: inherit;
        }

            .action-btn:hover {
                background: #2a3b54;
                border-color: #80aaff;
                transform: scale(0.97);
            }

            .action-btn:active {
                background: #1e2c44;
            }

        /* subtle indicator panel - smaller */
        .info-tip {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-family: monospace;
            color: #aab9e6;
            z-index: 20;
            pointer-events: none;
            border-left: 2px solid #5f8eff;
        }

        /* subtle footer for orbit hint */
        .controls-hint {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(6px);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.55rem;
            font-family: monospace;
            color: #bbc9f0;
            z-index: 20;
            pointer-events: none;
            letter-spacing: 0.2px;
        }

        /* selected state for answer */
        .answer-btn.selected {
            background: #3f5e9e;
            border-color: #ffd966;
            box-shadow: 0 0 8px rgba(255, 220, 100, 0.4);
            transform: scale(1.02);
        }

        @media (max-width: 650px) {
            .game-container {
                padding: 0.3rem 0.7rem 0.5rem 0.7rem;
                margin: 0 10px;
            }

            .answer-btn {
                padding: 0.2rem 0.6rem;
                font-size: 0.65rem;
            }

            h2 {
                font-size: 0.8rem;
            }

            .action-btn {
                padding: 0.2rem 0.7rem;
                font-size: 0.6rem;
            }

            .question-badge {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="game-container">
            <h2>🔍 BEBRAS CUBE</h2>
            <div class="question-badge">⚡ Which shape is opposite to the circle? ⚡</div>

            <div id="palette">
                <button class="answer-btn" data-shape="circle">🔴 Circle</button>
                <button class="answer-btn" data-shape="diamond">💎 Diamond</button>
                <button class="answer-btn" data-shape="ellipse">🥚 Ellipse</button>
                <button class="answer-btn" data-shape="pentagon">🔷 Pentagon</button>
                <button class="answer-btn" data-shape="star">⭐ Star</button>
                <button class="answer-btn" data-shape="triangle">🔺 Triangle</button>
            </div>

            <div class="action-bar">
                <button class="action-btn" id="finishBtn">✅ Finish & Score</button>
                <button class="action-btn" id="resetBtn">🔄 Reset Session</button>
                <button class="action-btn" id="giveUpBtn">🏳️ Reveal Answer</button>
            </div>
        </div>
    </div>
    <div class="info-tip">
        📊 Metrics active: click efficiency | drag time | error resilience
    </div>
    <div class="controls-hint">
        🖱️ Drag to rotate | Right-click to orbit
    </div>

    <!-- three.js libraries -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ========== SETUP SCENE ==========
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b14);
        scene.fog = new THREE.FogExp2(0x050b14, 0.008); // subtle depth

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4.8, 4.2, 5.5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // for light aesthetics
        document.body.appendChild(renderer.domElement);

        // Controls with smooth damping
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.enableZoom = true;
        controls.autoRotate = false;
        controls.target.set(0, 0, 0);

        // ========== STATS (unchanged logic) ==========
        let clicks = 0;
        let adjacencyErrors = 0;
        let resets = 0;
        let startTime = Date.now();
        let selectedAnswer = null;
        let attempts = 0;
        let errorScore = 10;

        // Drag tracking (exactly as original)
        let isDragging = false;
        let dragStart = 0;
        let dragTime = 0;
        let hasMoved = false;

        // ========== EVENT LISTENERS FOR DRAG & CLICKS ==========
        renderer.domElement.addEventListener("mousedown", () => {
            isDragging = true;
            hasMoved = false;
            dragStart = Date.now();
        });

        renderer.domElement.addEventListener("mousemove", () => {
            if (isDragging) hasMoved = true;
        });

        renderer.domElement.addEventListener("mouseup", () => {
            if (isDragging && hasMoved) {
                dragTime += (Date.now() - dragStart) / 1000;
            }
            isDragging = false;
        });

        // Global click tracking (document clicks, consistent with original)
        document.addEventListener("click", (e) => {
            // we count all clicks except if it's from the UI we still count per spec
            clicks++;
        });

        // ========== ANSWER SELECTION (with UI active class) ==========
        function selectAnswer(shape) {
            selectedAnswer = shape;
            attempts++;

            // highlight selected button
            document.querySelectorAll('.answer-btn').forEach(btn => {
                if (btn.getAttribute('data-shape') === shape) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });

            if (shape !== "diamond") {
                errorScore = Math.max(0, errorScore - 0.5);
            }
        }

        // ========== RESET GAME (preserves original logic) ==========
        function resetGame() {
            resets++;
            selectedAnswer = null;
            attempts = 0;
            clicks = 0;
            adjacencyErrors = 0;
            dragTime = 0;
            startTime = Date.now();
            errorScore = 10;    // important: restore base error score

            // clear UI highlight
            document.querySelectorAll('.answer-btn').forEach(btn => btn.classList.remove('selected'));

            // Optional subtle visual feedback
            const container = document.querySelector('.game-container');
            container.style.transform = 'scale(0.99)';
            setTimeout(() => { container.style.transform = ''; }, 120);
        }

        // ========== GIVE UP (reveal answer) ==========
        function giveUp() {
            alert("🔎 The correct answer is: 💎 Diamond\n\nThe diamond is positioned opposite to the circle on this cube.");
        }

        // ========== FINISH GAME (original scoring untouched) ==========
        function finishGame() {
            if (!selectedAnswer) {
                alert("⚠️ Please select an answer first (click on a shape button).");
                return;
            }

            if (selectedAnswer !== "diamond") {
                errorScore = Math.max(0, errorScore - 1);
                alert("❌ Incorrect! -1 Error penalty. Keep observing the cube and try again.");
                return;
            }

            const time = (Date.now() - startTime) / 1000;
            const finalErrorScore = Math.max(0, errorScore - resets);

            // Time score bands
            const timeScore =
                time < 60 ? 10 :
                    time < 90 ? 9 :
                        time < 120 ? 8 :
                            time < 150 ? 7 :
                                time < 180 ? 6 :
                                    time < 210 ? 5 :
                                        time < 240 ? 4 :
                                            time < 270 ? 3 :
                                                time < 300 ? 2 :
                                                    time < 330 ? 1 : 0;

            const clickScore =
                clicks <= 5 ? 10 :
                    clicks <= 10 ? 8 :
                        clicks <= 15 ? 6 :
                            clicks <= 20 ? 4 :
                                clicks <= 25 ? 2 : 0;

            const dragScore =
                dragTime < 5 ? 10 :
                    dragTime < 10 ? 8 :
                        dragTime < 20 ? 6 :
                            dragTime < 30 ? 4 :
                                dragTime < 45 ? 2 : 0;

            const finalScore = (
                0.4 * finalErrorScore +
                0.2 * timeScore +
                0.2 * clickScore +
                0.2 * dragScore
            ).toFixed(2);

            // formatting message
            alert(`🎉 CORRECT! 🎉

✨ Your Scorecard ✨
━━━━━━━━━━━━━━━━━━━━
🏆 Final Score: ${finalScore}/10
📊 Error Score: ${finalErrorScore.toFixed(2)}/10
⏱️ Time Score: ${timeScore}  (${time.toFixed(1)} sec)
🖱️ Click Score: ${clickScore}  (${clicks} total clicks)
🖱️ Drag Score: ${dragScore}  (${dragTime.toFixed(1)}s dragging)

📈 Performance Data:
• Answer Attempts: ${attempts}
• Session Resets: ${resets}
• Adjacency Errors: ${adjacencyErrors}
━━━━━━━━━━━━━━━━━━━━
💎 Diamond is opposite to the circle.`);

            // Send a summary move so host scoring can use accurate task metrics
            window.__kb?.send?.(
                'cube_summary',
                {
                    wrongSelections: Math.max(0, attempts - 1),
                    clicks,
                    dragTimeSec: dragTime,
                    elapsedSec: time
                },
                0
            );
            window.__kb?.finish?.({ finalScore: Number(finalScore), finalErrorScore, timeScore, clickScore, dragScore, time });
        }

        // ========== TEXTURE CREATION (enhanced quality) ==========
        function createShapeTexture(type) {
            const canvas = document.createElement("canvas");
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext("2d");

            // clean background with slight gradient for professional look
            ctx.fillStyle = "#f8fafc";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // soft inner glow / shadow style
            ctx.shadowBlur = 0;

            const colors = {
                circle: "#FF4D6D",
                diamond: "#9D4EDD",
                ellipse: "#E63946",
                pentagon: "#3A86FF",
                star: "#FFBE0B",
                triangle: "#2ECC71"
            };

            const mainColor = colors[type];
            ctx.fillStyle = mainColor;
            ctx.strokeStyle = "#1e293b";
            ctx.lineWidth = 6;
            ctx.shadowColor = "rgba(0,0,0,0.3)";
            ctx.shadowBlur = 8;
            ctx.beginPath();

            const cx = 128, cy = 128;

            if (type === "circle") {
                ctx.arc(cx, cy, 72, 0, Math.PI * 2);
            }
            else if (type === "triangle") {
                ctx.moveTo(cx, 40);
                ctx.lineTo(40, 200);
                ctx.lineTo(216, 200);
                ctx.closePath();
            }
            else if (type === "diamond") {
                ctx.moveTo(cx, 28);
                ctx.lineTo(208, cy);
                ctx.lineTo(cx, 228);
                ctx.lineTo(48, cy);
                ctx.closePath();
            }
            else if (type === "pentagon") {
                for (let i = 0; i < 5; i++) {
                    let angle = i * (2 * Math.PI / 5) - Math.PI / 2;
                    let x = cx + Math.cos(angle) * 78;
                    let y = cy + Math.sin(angle) * 78;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
            }
            else if (type === "star") {
                for (let i = 0; i < 10; i++) {
                    let radius = i % 2 === 0 ? 78 : 42;
                    let angle = i * (Math.PI / 5) - Math.PI / 2;
                    let x = cx + Math.cos(angle) * radius;
                    let y = cy + Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
            }
            else if (type === "ellipse") {
                ctx.ellipse(cx, cy, 85, 58, 0, 0, Math.PI * 2);
            }

            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;
            // add subtle inner highlight
            ctx.strokeStyle = "#ffffffcc";
            ctx.lineWidth = 2.5;
            ctx.stroke();

            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        // ========== CUBE CONSTRUCTION (original face arrangement) ==========
        const faceData = [
            ["circle", "pentagon", "triangle", "ellipse"],
            ["star", "triangle", "diamond", "ellipse"],
            ["star", "pentagon", "triangle", "circle"],
            ["diamond", "circle", "triangle", "ellipse"],
            ["circle", "ellipse", "diamond", "star"],
            ["star", "diamond", "triangle", "pentagon"]
        ];

        function createFace(faceIndex, rotation, position) {
            const group = new THREE.Group();

            for (let i = 0; i < 4; i++) {
                const shape = faceData[faceIndex][i];
                const material = new THREE.MeshStandardMaterial({
                    map: createShapeTexture(shape),
                    side: THREE.DoubleSide,
                    roughness: 0.3,
                    metalness: 0.1,
                    emissive: 0x000000
                });

                const geometry = new THREE.PlaneGeometry(0.96, 0.96);
                const mesh = new THREE.Mesh(geometry, material);

                let x = (i % 2 === 0) ? -0.5 : 0.5;
                let y = (i < 2) ? 0.5 : -0.5;
                mesh.position.set(x, y, 0);
                group.add(mesh);
            }

            group.rotation.set(rotation[0], rotation[1], rotation[2]);
            group.position.copy(position);
            scene.add(group);
        }

        const offset = 1.01;
        createFace(0, [0, 0, 0], new THREE.Vector3(0, 0, offset));
        createFace(1, [0, Math.PI, 0], new THREE.Vector3(0, 0, -offset));
        createFace(2, [-Math.PI / 2, 0, 0], new THREE.Vector3(0, offset, 0));
        createFace(3, [Math.PI / 2, 0, 0], new THREE.Vector3(0, -offset, 0));
        createFace(4, [0, -Math.PI / 2, 0], new THREE.Vector3(-offset, 0, 0));
        createFace(5, [0, Math.PI / 2, 0], new THREE.Vector3(offset, 0, 0));

        // ========== DECORATIVE ELEMENTS (professional look) ==========
        // subtle wireframe cube outline to enhance geometry
        const wireframeGeo = new THREE.BoxGeometry(2.04, 2.04, 2.04);
        const wireframeMat = new THREE.MeshBasicMaterial({ color: 0x3a6ea5, wireframe: true, transparent: true, opacity: 0.12 });
        const outlineCube = new THREE.Mesh(wireframeGeo, wireframeMat);
        scene.add(outlineCube);

        // Add floating particles / ambient stars
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 800;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 100;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xaac9ff, size: 0.12, transparent: true, opacity: 0.5 });
        const starsField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starsField);

        // Better lighting: ambient + directional + rim light
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 4);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.35);
        backLight.position.set(0, 1, -3.5);
        scene.add(backLight);

        // soft ground reflection effect (invisible but mood)
        const gridHelper = new THREE.GridHelper(12, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.8;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);

        // ========== BIND UI BUTTONS (preserve all original behaviors) ==========
        document.querySelectorAll('.answer-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const shape = btn.getAttribute('data-shape');
                selectAnswer(shape);
            });
        });

        document.getElementById('finishBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            finishGame();
        });

        document.getElementById('resetBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            resetGame();
        });

        document.getElementById('giveUpBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            giveUp();
        });

        // ========== ANIMATION LOOP ==========
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // update orbit
            // subtle rotation for stars
            starsField.rotation.y += 0.0005;
            starsField.rotation.x += 0.0003;
            renderer.render(scene, camera);
        }
        animate();

        // resize handler
        window.addEventListener("resize", onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // small console info (no logic change)
        console.log("Bebras Cube ready — all original metrics preserved, professional styling applied.");
    </script>

    <script type="module">
        import { createKbTask } from '/task-sdk.js';
        const kb = createKbTask('cube-game-1');
        window.__kb = kb;
        document.addEventListener('click', () => kb.click(), true);
    </script>
</body>
</html>
