<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚀 3D Stick Puzzle · Space Sorter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0f0f0;
            background: rgba(10, 20, 40, 0.7);
            padding: 12px 22px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border-left: 5px solid #ffaa00;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 10;
            font-weight: 500;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(10, 20, 40, 0.8);
            padding: 14px 28px;
            border-radius: 60px;
            backdrop-filter: blur(8px);
            display: flex;
            gap: 30px;
            align-items: center;
            z-index: 20;
            pointer-events: auto;
            border: 1px solid #3a5f8a;
            box-shadow: 0 8px 25px #00000080;
        }

            #controls button {
                background: #ffb347;
                border: none;
                color: #0a121c;
                font-weight: bold;
                font-size: 1.2rem;
                padding: 10px 24px;
                border-radius: 50px;
                cursor: pointer;
                box-shadow: 0 4px 0 #b16f1a, 0 6px 12px #00000060;
                transition: all 0.1s ease;
                border: 1px solid #ffd58c;
                letter-spacing: 0.5px;
            }

                #controls button:hover {
                    background: #ffca6e;
                    transform: translateY(-2px);
                    box-shadow: 0 6px 0 #b16f1a, 0 10px 18px #00000080;
                }

                #controls button:active {
                    transform: translateY(2px);
                    box-shadow: 0 2px 0 #b16f1a, 0 6px 12px #00000060;
                }

                #controls button:disabled {
                    background: #5a6a7a;
                    box-shadow: 0 4px 0 #2c3a48, 0 4px 8px #00000040;
                    color: #ccddee;
                    border-color: #7f8fa0;
                    transform: none;
                    pointer-events: none;
                }

        #message {
            color: #ffecb3;
            font-size: 1.3rem;
            min-width: 240px;
            text-align: center;
            font-weight: 600;
            text-shadow: 0 2px 5px black;
        }

        #instruction {
            position: absolute;
            bottom: 110px;
            left: 20px;
            color: #ccddee;
            background: rgba(10, 20, 40, 0.6);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1rem;
            backdrop-filter: blur(4px);
            pointer-events: none;
            border: 1px solid #4f6b8a;
        }

        #round-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: #1e3a5f;
            padding: 10px 28px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.5rem;
            backdrop-filter: blur(8px);
            border-right: 6px solid #6ec8ff;
            box-shadow: 0 6px 18px #00000070;
            pointer-events: none;
            z-index: 10;
        }

        #score-panel {
            position: absolute;
            top: 100px;
            right: 20px;
            color: #e0e0ff;
            background: rgba(10, 25, 45, 0.8);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid #5f9ea0;
            box-shadow: 0 6px 18px #00000070;
            pointer-events: none;
            z-index: 10;
            text-align: right;
            line-height: 1.8;
        }

            #score-panel span {
                font-weight: bold;
                color: #ffd966;
            }

        #final-score-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: gold;
            padding: 30px 50px;
            border-radius: 60px;
            font-size: 2.2rem;
            border: 3px solid #ffaa00;
            z-index: 30;
            display: none;
            text-align: center;
            backdrop-filter: blur(12px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">🚀 STICK SORTER · Match the color order (bottom → top)</div>
    <div id="round-badge">ROUND <span id="round-num">1</span>/3</div>
    <div id="score-panel">
        <div>⭐ ERROR SCORE: <span id="error-score">10.0</span></div>
        <div>⏱️ TIME SCORE: <span id="time-score">10</span></div>
        <div>🖱️ CLICK SCORE: <span id="click-score">10</span></div>
        <div style="margin-top:8px; border-top:1px solid #5f9ea0;">🏆 FINAL: <span id="final-score-display">—</span></div>
    </div>
    <div id="instruction">🖱️ Click a stick on the right → click another to swap · Match left stack</div>
    <div id="controls">
        <span id="message">✨ Sort the right sticks</span>
        <button id="checkBtn">✅ CHECK</button>
        <button id="nextRoundBtn" disabled>▶ NEXT ROUND</button>
    </div>
    <div id="final-score-message"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <script>
        (function () {
            // =====================
            // SCENE SETUP
            // =====================
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510); // deep space

            const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(2.5, 15.5, 15);
            camera.lookAt(1.8, 2.8, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // --- SPACE BACKGROUND EFFECTS ---

            // 1. Starfield particle system
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 3000;
            const starPositions = new Float32Array(starsCount * 3);
            const starColors = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount * 3; i += 3) {
                // Spread stars in a large sphere
                const r = 80 + Math.random() * 120;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                starPositions[i] = Math.sin(phi) * Math.cos(theta) * r;
                starPositions[i + 1] = Math.sin(phi) * Math.sin(theta) * r;
                starPositions[i + 2] = Math.cos(phi) * r;

                // Colors: white, light blue, occasional yellow
                const colorChoice = Math.random();
                if (colorChoice < 0.6) {
                    starColors[i] = 1; starColors[i + 1] = 1; starColors[i + 2] = 1;
                } else if (colorChoice < 0.85) {
                    starColors[i] = 0.8; starColors[i + 1] = 0.9; starColors[i + 2] = 1;
                } else {
                    starColors[i] = 1; starColors[i + 1] = 0.9; starColors[i + 2] = 0.7;
                }
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

            const starsMaterial = new THREE.PointsMaterial({
                size: 0.25,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // 2. Nebula glow (a few semi-transparent spheres)
            const nebulaMat = new THREE.MeshPhongMaterial({
                color: 0x335588,
                emissive: new THREE.Color(0x224466),
                transparent: true,
                opacity: 0.08,
                side: THREE.BackSide
            });
            const nebula1 = new THREE.Mesh(new THREE.SphereGeometry(45, 32, 16), nebulaMat);
            nebula1.position.set(-10, 5, -30);
            scene.add(nebula1);

            const nebula2 = new THREE.Mesh(new THREE.SphereGeometry(60, 32, 16),
                new THREE.MeshPhongMaterial({ color: 0x774466, emissive: new THREE.Color(0x553344), transparent: true, opacity: 0.06, side: THREE.BackSide }));
            nebula2.position.set(20, -10, -50);
            scene.add(nebula2);

            // 3. Animated rocketships (decorative)
            const rockets = [];

            function createRocket(color = 0xff5533) {
                const group = new THREE.Group();

                // Body
                const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 2.0, 8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: new THREE.Color(0x331100), emissiveIntensity: 0.3 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.rotation.x = Math.PI / 2;
                body.position.y = 0;
                group.add(body);

                // Nose cone
                const noseGeo = new THREE.ConeGeometry(0.45, 0.8, 8);
                const noseMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, emissive: new THREE.Color(0x224466), emissiveIntensity: 0.2 });
                const nose = new THREE.Mesh(noseGeo, noseMat);
                nose.position.y = 1.2;
                nose.rotation.x = Math.PI / 2;
                group.add(nose);

                // Fins
                const finGeo = new THREE.BoxGeometry(0.1, 0.6, 0.8);
                const finMat = new THREE.MeshStandardMaterial({ color: 0xaa5533 });
                const fin1 = new THREE.Mesh(finGeo, finMat);
                fin1.position.set(0.35, 0, 0);
                fin1.rotation.z = -0.2;
                group.add(fin1);
                const fin2 = fin1.clone();
                fin2.position.set(-0.35, 0, 0);
                fin2.rotation.z = 0.2;
                group.add(fin2);
                const fin3 = fin1.clone();
                fin3.position.set(0, 0, 0.35);
                fin3.rotation.x = 0.2;
                fin3.rotation.z = 0;
                group.add(fin3);
                const fin4 = fin3.clone();
                fin4.position.set(0, 0, -0.35);
                fin4.rotation.x = -0.2;
                group.add(fin4);

                // Flame
                const flameGeo = new THREE.ConeGeometry(0.25, 0.7, 6);
                const flameMat = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: new THREE.Color(0xff4400), emissiveIntensity: 1.0 });
                const flame = new THREE.Mesh(flameGeo, flameMat);
                flame.position.y = -1.2;
                flame.rotation.x = Math.PI / 2;
                group.add(flame);

                return group;
            }

            // Create a few rockets with different colors and trajectories
            const rocket1 = createRocket(0xff5533);
            rocket1.position.set(-8, 6, -15);
            rocket1.scale.set(0.8, 0.8, 0.8);
            scene.add(rocket1);
            rockets.push({ mesh: rocket1, speed: 0.005, radius: 12, angle: 0, heightAmp: 2, centerY: 5 });

            const rocket2 = createRocket(0x33aaff);
            rocket2.position.set(10, 4, -20);
            rocket2.scale.set(0.7, 0.7, 0.7);
            scene.add(rocket2);
            rockets.push({ mesh: rocket2, speed: 0.008, radius: 15, angle: 2.5, heightAmp: 1.5, centerY: 4 });

            const rocket3 = createRocket(0x88dd88);
            rocket3.position.set(-5, 7, -25);
            rocket3.scale.set(0.6, 0.6, 0.6);
            scene.add(rocket3);
            rockets.push({ mesh: rocket3, speed: 0.006, radius: 18, angle: 4.0, heightAmp: 2.5, centerY: 6 });

            // Small distant satellites (just cubes)
            const satGeo = new THREE.BoxGeometry(0.3, 0.1, 0.5);
            const satMat = new THREE.MeshStandardMaterial({ color: 0xaaccff, emissive: new THREE.Color(0x224466) });
            const sat1 = new THREE.Mesh(satGeo, satMat);
            sat1.position.set(15, 8, -30);
            scene.add(sat1);
            rockets.push({ mesh: sat1, speed: 0.003, radius: 25, angle: 1.2, heightAmp: 1, centerY: 8 });

            const sat2 = sat1.clone();
            sat2.position.set(-18, 6, -35);
            scene.add(sat2);
            rockets.push({ mesh: sat2, speed: 0.004, radius: 22, angle: 3.8, heightAmp: 1.2, centerY: 7 });

            // --- LIGHTING (enhanced for space) ---
            const ambient = new THREE.AmbientLight(0x404c66, 0.6);
            scene.add(ambient);

            const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.3);
            mainLight.position.set(5, 14, 8);
            mainLight.castShadow = true;
            mainLight.receiveShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            const d = 12;
            mainLight.shadow.camera.left = -d;
            mainLight.shadow.camera.right = d;
            mainLight.shadow.camera.top = d;
            mainLight.shadow.camera.bottom = -d;
            mainLight.shadow.camera.near = 1;
            mainLight.shadow.camera.far = 30;
            mainLight.shadow.bias = -0.0008;
            scene.add(mainLight);

            const fillLight1 = new THREE.PointLight(0x5c8ab3, 0.9);
            fillLight1.position.set(-4, 5, 6);
            scene.add(fillLight1);

            const fillLight2 = new THREE.PointLight(0xb39d7c, 0.5);
            fillLight2.position.set(3, 3, -5);
            scene.add(fillLight2);

            const backRim = new THREE.PointLight(0x6a9ec0, 0.6);
            backRim.position.set(-2, 5, -10);
            scene.add(backRim);

            // Add a subtle blueish fill from below for space ambiance
            const spaceFill = new THREE.PointLight(0x335577, 0.4);
            spaceFill.position.set(0, -2, 5);
            scene.add(spaceFill);

            // --- GROUND & DECOR (keep original but adjusted for space) ---
            const gridHelper = new THREE.GridHelper(20, 24, 0x88aacc, 0x224466);
            gridHelper.position.y = 0.02;
            scene.add(gridHelper);

            const planeMat = new THREE.MeshStandardMaterial({ color: 0x142433, roughness: 0.9, metalness: 0.2, transparent: true, opacity: 0.3 });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(18, 10), planeMat);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = 0;
            plane.receiveShadow = true;
            scene.add(plane);

            // =====================
            // VIBRANT COLOR PALETTE (unchanged)
            // =====================
            const colorPalette = [
                0xff6b6b, // coral red
                0xffb347, // orange
                0x9b59b6, // purple
                0xe84393, // hot pink / magenta
                0xf4d03f, // yellow
                0xe67e22, // deep orange
                0x2ecc71, // emerald green
                0x1abc9c, // turquoise (teal)
                0x3498db, // bright blue (distinct)
                0xe74c3c  // vibrant red
            ];

            function createMaterialFromColor(colorHex) {
                return new THREE.MeshStandardMaterial({
                    color: colorHex,
                    roughness: 0.45,
                    metalness: 0.1,
                    emissive: new THREE.Color(0x111111),
                    emissiveIntensity: 0.08,
                    transparent: true,
                    opacity: 0.98
                });
            }

            // =====================
            // GAME STATE (unchanged)
            // =====================
            const rounds = [3, 5, 6];
            let roundIndex = 0;
            let currentCount = 0;

            let leftSticks = [];
            let leftData = [];

            let rightSticks = [];
            let rightDataOrder = [];
            let slotPositions = [];

            let selectedStick = null;
            let isGameActive = true;
            let roundCompleted = false;

            // ----- SCORING (unchanged) -----
            let errorScore = 10.0;
            let timeScore = 10;
            let clickScore = 10;
            let totalClicks = 0;
            const startTime = Date.now();
            let gameFinished = false;

            // UI elements
            const messageEl = document.getElementById('message');
            const checkBtn = document.getElementById('checkBtn');
            const nextBtn = document.getElementById('nextRoundBtn');
            const roundSpan = document.getElementById('round-num');
            const errorScoreEl = document.getElementById('error-score');
            const timeScoreEl = document.getElementById('time-score');
            const clickScoreEl = document.getElementById('click-score');
            const finalScoreDisplay = document.getElementById('final-score-display');
            const finalScoreMessage = document.getElementById('final-score-message');

            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();

            // Update score displays
            function updateScoreUI() {
                errorScoreEl.textContent = errorScore.toFixed(1);
                timeScoreEl.textContent = timeScore;
                clickScoreEl.textContent = clickScore;
                if (gameFinished) {
                    const final = (errorScore * 0.6) + (timeScore * 0.3) + (clickScore * 0.1);
                    finalScoreDisplay.textContent = final.toFixed(2);
                } else {
                    finalScoreDisplay.textContent = '—';
                }
            }

            function computeClickPenalty() {
                if (totalClicks <= 20) return 0;
                return 1 + Math.floor((totalClicks - 21) / 5);
            }

            function updateClickScore() {
                const penalty = computeClickPenalty();
                clickScore = Math.max(0, 10 - penalty);
                updateScoreUI();
            }

            function computeTimePenalty(elapsedSec) {
                if (elapsedSec <= 60) return 0;
                return 1 + Math.floor((elapsedSec - 60) / 20);
            }

            function updateTimeScore() {
                const elapsed = (Date.now() - startTime) / 1000;
                const penalty = computeTimePenalty(elapsed);
                timeScore = Math.max(0, 10 - penalty);
                updateScoreUI();
            }

            function applySwapErrorPenalty(idxA, idxB) {
                const stickA = rightSticks[idxA];
                const stickB = rightSticks[idxB];

                const colorA = stickA.userData.color;
                const colorB = stickB.userData.color;

                const targetColorA = leftData[idxA].color;
                const targetColorB = leftData[idxB].color;

                const aIsCorrect = (colorA === targetColorA);
                const bIsCorrect = (colorB === targetColorB);

                if (!aIsCorrect && !bIsCorrect) {
                    errorScore = Math.max(0, errorScore - 0.5);
                    updateScoreUI();
                }
            }

            function checkGameCompletion() {
                if (roundIndex === rounds.length && roundCompleted) {
                    gameFinished = true;
                    const final = (errorScore * 0.6) + (timeScore * 0.3) + (clickScore * 0.1);
                    finalScoreDisplay.textContent = final.toFixed(2);
                    finalScoreMessage.style.display = 'block';
                    finalScoreMessage.innerHTML = `🏆 FINAL SCORE: ${final.toFixed(2)}<br><span style="font-size:0.9rem; color:#ccc;">Error: ${errorScore.toFixed(1)} | Time: ${timeScore} | Clicks: ${clickScore}</span>`;
                    messageEl.textContent = "🎉 All rounds complete! Great job!";

                    window.__kb?.finish?.({ finalScore: Number(final.toFixed(2)), errorScore, timeScore, clickScore });
                }
            }

            // =====================
            // CLEAR & CREATE ROUND (unchanged game logic)
            // =====================
            function clearSticks() {
                leftSticks.forEach(s => scene.remove(s));
                rightSticks.forEach(s => scene.remove(s));
                leftSticks = [];
                rightSticks = [];
                leftData = [];
                rightDataOrder = [];
                slotPositions = [];
                selectedStick = null;
            }

            function createRound(count) {
                clearSticks();
                currentCount = count;
                roundCompleted = false;
                isGameActive = true;
                nextBtn.disabled = true;
                messageEl.textContent = `🎨 Sort the ${count} sticks by color (bottom → top)`;
                updateRoundDisplay();

                const usedColors = new Set();
                for (let i = 0; i < count; i++) {
                    let color;
                    do {
                        color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                    } while (usedColors.has(color) && usedColors.size < colorPalette.length);
                    usedColors.add(color);
                    leftData.push({ color });
                }

                const leftBaseX = -4.8;
                const leftBaseZ = 0.8;

                for (let i = 0; i < count; i++) {
                    const geom = new THREE.CylinderGeometry(0.28, 0.28, 4.4, 14);
                    const material = createMaterialFromColor(leftData[i].color);
                    const stick = new THREE.Mesh(geom, material);

                    stick.rotation.z = Math.PI / 2;
                    stick.rotation.y = Math.random() * Math.PI * 2;

                    stick.position.y = 1.1 + i * 1.0;
                    stick.position.x = leftBaseX + (Math.random() * 0.2 - 0.1);
                    stick.position.z = leftBaseZ + (Math.random() * 0.3 - 0.15);

                    stick.castShadow = true;
                    stick.receiveShadow = true;
                    stick.userData = { ...leftData[i], index: i };

                    scene.add(stick);
                    leftSticks.push(stick);
                }

                const shuffled = [...leftData];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                rightDataOrder = shuffled.map(item => ({ ...item }));

                const startX = 1.5;
                const endX = 7.5;
                const step = (count > 1) ? (endX - startX) / (count - 1) : 0;

                for (let i = 0; i < count; i++) {
                    const xPos = startX + i * step;
                    slotPositions.push(xPos);

                    const geom = new THREE.CylinderGeometry(0.3, 0.3, 5.0, 16);
                    const data = rightDataOrder[i];
                    const material = createMaterialFromColor(data.color);
                    const stick = new THREE.Mesh(geom, material);

                    stick.position.set(xPos, 2.7, -0.3);
                    stick.castShadow = true;
                    stick.receiveShadow = true;
                    stick.userData = { ...data, slotIndex: i, isRight: true };

                    scene.add(stick);
                    rightSticks.push(stick);

                    const ringGeo = new THREE.TorusGeometry(0.42, 0.04, 8, 24);
                    const ringMat = new THREE.MeshStandardMaterial({ color: 0x9bb7d4, emissive: new THREE.Color(0x2a4a6a), emissiveIntensity: 0.4 });
                    const ring = new THREE.Mesh(ringGeo, ringMat);
                    ring.rotation.x = Math.PI / 2;
                    ring.position.set(xPos, 0.18, -0.3);
                    ring.receiveShadow = true;
                    scene.add(ring);
                }
            }

            function checkOrder() {
                if (!isGameActive || roundCompleted) return false;
                let correct = true;
                for (let i = 0; i < currentCount; i++) {
                    if (rightSticks[i].userData.color !== leftData[i].color) {
                        correct = false;
                        break;
                    }
                }
                if (correct) {
                    roundCompleted = true;
                    isGameActive = false;
                    messageEl.textContent = "✅ PERFECT! Ready for next round!";
                    nextBtn.disabled = false;
                    rightSticks.forEach(s => {
                        s.material.emissive.setHex(0xaaccff);
                        s.material.emissiveIntensity = 0.45;
                    });
                    if (roundIndex === rounds.length - 1) {
                        messageEl.textContent = "🎉 CONGRATULATIONS! All rounds complete!";
                        checkGameCompletion();
                    }
                } else {
                    messageEl.textContent = "❌ Not yet... Keep swapping!";
                }
                return correct;
            }

            function swapRightSticks(idxA, idxB) {
                if (idxA === idxB) return;
                const stickA = rightSticks[idxA];
                const stickB = rightSticks[idxB];

                const tempData = { ...stickA.userData };
                stickA.userData = { ...stickB.userData, slotIndex: idxA };
                stickB.userData = { ...tempData, slotIndex: idxB };

                stickA.material = createMaterialFromColor(stickA.userData.color);
                stickB.material = createMaterialFromColor(stickB.userData.color);

                [rightDataOrder[idxA], rightDataOrder[idxB]] = [rightDataOrder[idxB], rightDataOrder[idxA]];

                applySwapErrorPenalty(idxA, idxB);
                checkOrder();
            }

            function clearHighlight() {
                if (selectedStick) {
                    selectedStick.material.emissive.setHex(0x222222);
                    selectedStick.material.emissiveIntensity = 0.1;
                    selectedStick = null;
                }
            }

            function setHighlight(stick) {
                clearHighlight();
                selectedStick = stick;
                stick.material.emissive.setHex(0xffcc44);
                stick.material.emissiveIntensity = 1.2;
            }

            function onMouseClick(event) {
                if (!isGameActive || roundCompleted) return;

                mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
                mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const intersects = raycaster.intersectObjects(rightSticks);
                if (intersects.length === 0) {
                    clearHighlight();
                    return;
                }

                const hitStick = intersects[0].object;
                const hitIndex = rightSticks.indexOf(hitStick);
                if (hitIndex === -1) return;

                totalClicks++;
                updateClickScore();

                if (selectedStick === null) {
                    setHighlight(hitStick);
                    messageEl.textContent = `🔸 Selected stick ${hitIndex + 1}. Click another.`;
                } else {
                    const firstIdx = rightSticks.indexOf(selectedStick);
                    if (firstIdx === hitIndex) {
                        clearHighlight();
                        messageEl.textContent = `✨ Sort the right sticks`;
                    } else {
                        swapRightSticks(firstIdx, hitIndex);
                        clearHighlight();
                    }
                }
            }

            function advanceRound() {
                if (!roundCompleted && roundIndex > 0) {
                    messageEl.textContent = "⚠️ Complete current round first!";
                    return;
                }
                if (roundIndex < rounds.length) {
                    createRound(rounds[roundIndex]);
                    roundIndex++;
                    updateRoundDisplay();
                    nextBtn.disabled = true;
                    clearHighlight();
                } else {
                    messageEl.textContent = "🏆 You've mastered all rounds!";
                    checkGameCompletion();
                }
            }

            function updateRoundDisplay() {
                roundSpan.textContent = `${roundIndex + 1}/${rounds.length}`;
            }

            function startGame() {
                roundIndex = 0;
                createRound(rounds[0]);
                roundIndex = 1;
                updateRoundDisplay();
                updateScoreUI();
            }

            // Periodic time score update
            setInterval(() => {
                if (!gameFinished) {
                    updateTimeScore();
                }
            }, 1000);

            // Event listeners
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            renderer.domElement.addEventListener('click', onMouseClick);

            checkBtn.addEventListener('click', () => {
                if (!isGameActive || roundCompleted) return;
                checkOrder();
            });

            nextBtn.addEventListener('click', advanceRound);

            window.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !nextBtn.disabled) {
                    e.preventDefault();
                    advanceRound();
                }
            });

            // =====================
            // ANIMATION LOOP (with rocket movement)
            // =====================
            function animate() {
                requestAnimationFrame(animate);

                // Animate rockets (circular motion)
                rockets.forEach(item => {
                    item.angle += item.speed;
                    const x = Math.cos(item.angle) * item.radius;
                    const z = Math.sin(item.angle) * item.radius * 0.5 - 20; // keep behind scene
                    const y = item.centerY + Math.sin(item.angle * 1.5) * item.heightAmp;
                    item.mesh.position.set(x, y, z);
                    // Rotate rocket to face direction
                    item.mesh.rotation.y = item.angle + Math.PI / 2;
                    item.mesh.rotation.z = Math.sin(item.angle) * 0.1;
                });

                // Slowly rotate stars for subtle motion
                stars.rotation.y += 0.0001;

                camera.lookAt(1.5, 2.8, 0);
                renderer.render(scene, camera);
            }

            startGame();
            animate();
        })();
    </script>

    <script type="module">
        import { createKbTask } from '/task-sdk.js';
        const kb = createKbTask('pick-up-sticks-3');
        window.__kb = kb;
        document.addEventListener('click', () => kb.click(), true);
    </script>
</body>
